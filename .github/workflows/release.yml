name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --locked

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Verify workspace builds
        run: cargo build --workspace

      - name: Bump workspace version
        id: bump
        run: |
          cargo workspaces version ${{ inputs.bump }} \
            --all \
            --force '*' \
            --no-individual-tags \
            --yes \
            --message "chore(release): v%v"
          NEW_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name=="void") | .version')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          git-cliff --tag ${{ steps.bump.outputs.tag }} --latest --strip header --output RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Push commit and tags
        run: git push --follow-tags origin main

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo workspaces publish \
            --from-git \
            --publish-as-is \
            --yes \
            --token "$CARGO_REGISTRY_TOKEN"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
