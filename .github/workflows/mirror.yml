name: Mirror to eip

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MIRROR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Mirror clone source
        run: |
          git clone --mirror https://github.com/${{ github.repository }}.git repo.git

      - name: Push mirror to eip
        working-directory: repo.git
        run: |
          git remote add mirror git@github.com:EpitechPGE45-2025/G-EIP-700-PAR-7-1-eip-44.git
          git push --force --prune mirror 'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
