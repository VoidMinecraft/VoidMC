name: Mirror to eip

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Fetch all refs
        run: |
          git fetch origin --prune --tags '+refs/heads/*:refs/heads/*'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MIRROR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push mirror
        run: |
          git remote add mirror git@github.com:EpitechPGE45-2025/G-EIP-700-PAR-7-1-eip-44.git
          git push --mirror mirror
